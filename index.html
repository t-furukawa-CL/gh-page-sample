<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせフォーム</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 500px; margin: 40px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        button:disabled { background: #ccc; }
        #message-area { margin-top: 20px; padding: 10px; display: none; }
    </style>
</head>
<body>

    <h2>お問い合わせ</h2>
    <form id="contact-form">
        <div class="form-group">
            <label>お名前</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label>メールアドレス</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label>お問い合わせ内容</label>
            <textarea id="message" rows="5" required></textarea>
        </div>
        <button type="submit" id="submit-btn">送信する</button>
    </form>

    <div id="message-area"></div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwzfnx-Y12c_DzbJxN-NvrR3sXkyiA0sHj_vDJZ6ZDk3fpjfIGPGpA4Gwmmts-lv_8C/exec";

        document.getElementById('contact-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const msgArea = document.getElementById('message-area');
            
            btn.disabled = true;
            btn.textContent = "送信中...";

            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value
            };

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });

                msgArea.style.display = "block";
                msgArea.style.backgroundColor = "#d4edda";
                msgArea.textContent = "お問い合わせを受け付けました。ありがとうございます！";
                document.getElementById('contact-form').reset();
            } catch (error) {
                msgArea.style.display = "block";
                msgArea.style.backgroundColor = "#f8d7da";
                msgArea.textContent = "送信に失敗しました。時間をおいて再度お試しください。";
            } finally {
                btn.disabled = false;
                btn.textContent = "送信する";
            }
        });
    </script>
</body>
</html>
